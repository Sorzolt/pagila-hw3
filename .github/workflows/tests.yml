name: tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build database and run tests
        run: |
          docker compose up -d --build
          sleep 20
          docker compose exec -T pg ./run_tests.sh
